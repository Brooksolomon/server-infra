# SERVER-LEVEL shared reverse proxy. Run ONCE per server (not per project).
# Traefik owns ports 80/443 for the whole machine, auto-discovers project
# containers via Docker labels (no central routing file to edit), and issues
# HTTPS certs automatically via Cloudflare DNS-01 — required for wildcard
# domains and works even for brand-new subdomains with no manual step.
#
#   docker network create proxy        # one time
#   cp .env.example .env && edit it    # CF token + ACME email
#   docker compose up -d                # from this infra/ dir
#
# Every project then joins the external "proxy" network and gets Traefik
# labels on its own web service. See README.md.

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
    env_file:
      - .env
    # Use public DNS resolvers inside the container — the host's stub resolver
    # (127.0.0.53) is unreachable from containers and breaks ACME/Let's Encrypt.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  traefik_letsencrypt:
